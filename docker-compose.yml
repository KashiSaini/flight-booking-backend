services:
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - redis

  flight-service:
    build:
      context: .
      dockerfile: services/flight-service/Dockerfile
    container_name: flight-service
    ports:
      - "8002:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - redis
      - mongo

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "8003:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - redis
      - mongo
      - kafka

  booking-worker:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-worker
    command: celery -A shared.core.celery_app:celery_app worker --loglevel=INFO
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - redis
      - postgres
      - mongo
    restart: unless-stopped

  private-jet-service:
    build:
      context: .
      dockerfile: services/private-jet-service/Dockerfile
    container_name: private-jet-service
    ports:
      - "8004:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: admin-service
    ports:
      - "8005:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - mongo
      - kafka

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kashi
      POSTGRES_DB: flight
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    hostname: kafka
    ports:
    - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

volumes:
  postgres_data:
  redis_data:
  mongo_data: